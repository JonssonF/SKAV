name: .NET

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      Seed__AdminPassword: "1234"

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - run: dotnet restore
    - run: dotnet build --no-restore
    - run: dotnet test --no-build