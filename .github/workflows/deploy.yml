name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: dotnet test

      - name: Deploy
        run: |
          cd /home/fredrikjonsson/deploy/SKAV
          git pull
          docker compose up -d --build